global:
  scrape_interval: 5s

scrape_configs:

  - job_name: 'api-cursos'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-cursos:8080']

  - job_name: 'servicio-usuarios'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['servicio-usuarios:8080']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']