version: '3.8'

services:
  # La aplicación a observar
  repodevops:
    build:
      context: ../api_cursos
      dockerfile: dockerfile
    ports:
      - "8080:8081"
    environment:
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,prometheus"

  servicio_usuarios:
    build:
      context: ../servicio_usuarios
      dockerfile: dockerfile
    ports:
      - "8082:8080"

  # Recolecta y almacena métricas (modelo pull)
  prometheus:
    image: prom/prometheus:v3.9.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro

  # Visualización: dashboards sobre los datos de Prometheus
  grafana:
    image: grafana/grafana:12.3.1
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "devops"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

  # Métricas de CPU/memoria de todos los contenedores del host
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
