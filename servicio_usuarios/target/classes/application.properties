spring.application.name=servicio_usuarios

# Actuator - Enable Prometheus endpoint
management.endpoints.web.exposure.include=health,prometheus
management.metrics.export.prometheus.enabled=true

#Conector
spring.datasource.url=jdbc:mysql://mysql-db:3306/devops_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=devops_user
spring.datasource.password=devops_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#Configuracion repo JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

#mostrar errores
server.error.include-binding-errors=always
server.error.include-message=always

jwt.secret=clave-super-secreta-para-testeo-1234567890
